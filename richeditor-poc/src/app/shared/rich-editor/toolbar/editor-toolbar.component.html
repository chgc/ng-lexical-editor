<div
  class="toolbar"
  role="toolbar"
  aria-label="Text formatting"
  (mousedown)="$event.preventDefault()"
>
  <!-- Block type selector -->
  <select
    class="block-select"
    [value]="es.blockType()"
    (mousedown)="$event.stopPropagation()"
    (change)="es.setBlockType($any($event.target).value)"
  >
    @for (opt of es.headingOptions; track opt.value) {
      <option [value]="opt.value">{{ opt.label }}</option>
    }
  </select>

  <span class="divider"></span>

  <!-- Inline format -->
  <button type="button" class="toolbar-btn" [class.active]="es.isBold()"          (click)="es.format('bold')"          title="Bold (Ctrl+B)"><strong>B</strong></button>
  <button type="button" class="toolbar-btn" [class.active]="es.isItalic()"         (click)="es.format('italic')"        title="Italic (Ctrl+I)"><em>I</em></button>
  <button type="button" class="toolbar-btn" [class.active]="es.isUnderline()"      (click)="es.format('underline')"     title="Underline (Ctrl+U)"><u>U</u></button>
  <button type="button" class="toolbar-btn" [class.active]="es.isStrikethrough()"  (click)="es.format('strikethrough')" title="Strikethrough"><s>S</s></button>
  <button type="button" class="toolbar-btn" [class.active]="es.isInlineCode()"     (click)="es.format('code')"          title="Inline Code (`)"
  ><code style="font-size:12px">&#96;&#96;</code></button>

  <span class="divider"></span>

  <!-- Font color -->
  <label class="toolbar-btn color-btn" title="Font Color" (mousedown)="$event.stopPropagation()">
    <span class="color-icon" [style.border-bottom-color]="es.fontColor()">A</span>
    <input type="color" [value]="es.fontColor()" (input)="es.applyFontColor($any($event.target).value)" />
  </label>

  <!-- Background color -->
  <label class="toolbar-btn color-btn" title="Highlight Color" (mousedown)="$event.stopPropagation()">
    <span class="color-icon bg-icon" [style.background-color]="es.bgColor()">A</span>
    <input type="color" [value]="es.bgColor()" (input)="es.applyBgColor($any($event.target).value)" />
  </label>

  <span class="divider"></span>

  <!-- Lists -->
  <button type="button" class="toolbar-btn" [class.active]="es.listType() === 'bullet'" (click)="es.insertUnorderedList()" title="Toggle Bullet List">&#8226;&#8212;</button>
  <button type="button" class="toolbar-btn" [class.active]="es.listType() === 'number'" (click)="es.insertOrderedList()"   title="Toggle Numbered List">1&#8212;</button>

  <span class="divider"></span>

  <!-- Text alignment -->
  <button type="button" class="toolbar-btn" [class.active]="es.textAlign() === 'left'"   (click)="es.setAlignment('left')"   title="Align Left">⇤</button>
  <button type="button" class="toolbar-btn" [class.active]="es.textAlign() === 'center'" (click)="es.setAlignment('center')" title="Align Center">⇔</button>
  <button type="button" class="toolbar-btn" [class.active]="es.textAlign() === 'right'"  (click)="es.setAlignment('right')"  title="Align Right">⇥</button>

  <span class="divider"></span>

  <!-- Undo / Redo -->
  <button type="button" class="toolbar-btn" (click)="es.undo()" title="Undo (Ctrl+Z)">↩</button>
  <button type="button" class="toolbar-btn" (click)="es.redo()" title="Redo (Ctrl+Y)">↪</button>

  <span class="divider"></span>

  <!-- Code language selector (only visible when cursor is in a code block) -->
  @if (es.blockType() === 'code') {
    <select
      class="block-select code-lang-select"
      [value]="es.codeLanguage()"
      (mousedown)="$event.stopPropagation()"
      (change)="es.setCodeLanguage($any($event.target).value)"
      title="Syntax language"
    >
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
      <option value="csharp">C#</option>
      <option value="cpp">C++</option>
      <option value="go">Go</option>
      <option value="rust">Rust</option>
      <option value="sql">SQL</option>
      <option value="bash">Bash</option>
      <option value="json">JSON</option>
      <option value="markdown">Markdown</option>
      <option value="yaml">YAML</option>
      <option value="plaintext">Plain text</option>
    </select>
    <span class="divider"></span>
  }

  <!-- Image upload -->
  <label class="toolbar-btn" title="Insert Image" style="cursor: pointer">
    🖼
    <input
      type="file"
      accept="image/*"
      style="display: none"
      (mousedown)="$event.stopPropagation()"
      (change)="onImageFileSelected($event)"
    />
  </label>

  <!-- Insert Table -->
  <button type="button" class="toolbar-btn" title="Insert 3×3 Table" (click)="es.insertTable(3, 3)">⊞</button>
</div>
