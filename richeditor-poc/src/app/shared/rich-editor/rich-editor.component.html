<div class="rich-editor-wrapper">
  <!-- Toolbar -->
  <div class="toolbar" role="toolbar" aria-label="Text formatting">
    <button type="button" class="toolbar-btn" [class.active]="isBold()"
            (click)="format('bold')" title="Bold (Ctrl+B)">
      <strong>B</strong>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isItalic()"
            (click)="format('italic')" title="Italic (Ctrl+I)">
      <em>I</em>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isUnderline()"
            (click)="format('underline')" title="Underline (Ctrl+U)">
      <u>U</u>
    </button>

    <span class="divider"></span>

    <button type="button" class="toolbar-btn"
            (click)="insertUnorderedList()" title="Bullet List">
      &#8226;&#8212;
    </button>
    <button type="button" class="toolbar-btn"
            (click)="insertOrderedList()" title="Numbered List">
      1&#8212;
    </button>

    <span class="divider"></span>

    <button type="button" class="toolbar-btn" (click)="undo()" title="Undo (Ctrl+Z)">↩</button>
    <button type="button" class="toolbar-btn" (click)="redo()" title="Redo (Ctrl+Y)">↪</button>
  </div>

  <!-- Editor contenteditable area -->
  <div #editorEl
       class="editor-content"
       contenteditable="true"
       data-placeholder="Enter rich text here...">
  </div>
</div>
