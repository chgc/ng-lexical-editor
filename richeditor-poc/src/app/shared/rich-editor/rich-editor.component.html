<div class="rich-editor-wrapper">
  <!-- Toolbar (separate composable component) -->
  <app-editor-toolbar />

  <!-- Editor area: position:relative wrapper for resize/reorder indicators -->
  <div class="editor-area">
    <div
      #editorEl
      class="editor-content"
      contenteditable="true"
      data-placeholder="Type here... (supports Markdown: ## Heading, **bold**, `code`, ``` code block)"
      (mousemove)="onEditorMouseMove($event)"
      (mouseleave)="onEditorMouseLeave($event)"
      (mousedown)="onEditorMouseDown($event)"
      (click)="onEditorClick($event)"
    ></div>

    <!-- Block drag handle (shown when hovering a top-level block) -->
    @if (blockDragHandle(); as bh) {
      <button
        class="block-drag-handle"
        [style.top.px]="bh.y + 2"
        title="Drag to reorder"
        (mousedown)="onBlockDragHandleMouseDown($event)"
        (mouseenter)="onBlockDragHandleEnter()"
        (mouseleave)="onBlockDragHandleLeave($event)"
      >⠿</button>
    }

    <!-- Table cell action button (top-right of hovered cell) -->
    @if (tableActionBtn(); as btn) {
      <button
        class="table-action-btn"
        [style.left.px]="btn.x"
        [style.top.px]="btn.y"
        title="Table options"
        (mouseenter)="onTableActionBtnEnter()"
        (mouseleave)="onTableActionBtnLeave($event)"
        (mousedown)="$event.preventDefault(); $event.stopPropagation()"
        (click)="openTableMenu($event)"
      >⋮</button>
    }

    <!-- Image resize handles (shown when image is selected) -->
    @if (imageSelection(); as img) {
      <div class="image-resize-box"
           [style.left.px]="img.x"
           [style.top.px]="img.y"
           [style.width.px]="img.w"
           [style.height.px]="img.h">
      </div>
      <div class="image-resize-handle handle-nw"
           [style.left.px]="img.x - 5" [style.top.px]="img.y - 5"
           (mousedown)="startImgResize($event, 'nw')"></div>
      <div class="image-resize-handle handle-ne"
           [style.left.px]="img.x + img.w - 5" [style.top.px]="img.y - 5"
           (mousedown)="startImgResize($event, 'ne')"></div>
      <div class="image-resize-handle handle-sw"
           [style.left.px]="img.x - 5" [style.top.px]="img.y + img.h - 5"
           (mousedown)="startImgResize($event, 'sw')"></div>
      <div class="image-resize-handle handle-se"
           [style.left.px]="img.x + img.w - 5" [style.top.px]="img.y + img.h - 5"
           (mousedown)="startImgResize($event, 'se')"></div>
    }

    <!-- Resize indicator line -->
    @if (resizeIndicator(); as ri) {
      <div
        class="resize-line"
        [class.resize-line-v]="ri.vertical"
        [class.resize-line-h]="!ri.vertical"
        [style.left.px]="ri.vertical ? ri.position : 0"
        [style.top.px]="ri.vertical ? 0 : ri.position"
      ></div>
    }

    <!-- Reorder drop indicator line -->
    @if (reorderIndicator(); as roi) {
      <div
        class="reorder-line"
        [style.left.px]="roi.x"
        [style.top.px]="roi.y"
        [style.width.px]="roi.w"
        [style.height.px]="roi.h"
      ></div>
    }

    <!-- Code language picker (bottom-right of focused code block) -->
    @if (codeBlockOverlay(); as cbo) {
      <select
        class="code-lang-overlay"
        [style.left.px]="cbo.x"
        [style.top.px]="cbo.y"
        [value]="es.codeLanguage()"
        (mousedown)="$event.stopPropagation()"
        (change)="es.setCodeLanguage($any($event.target).value)"
        title="Syntax language"
      >
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="csharp">C#</option>
        <option value="cpp">C++</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="sql">SQL</option>
        <option value="bash">Bash</option>
        <option value="json">JSON</option>
        <option value="markdown">Markdown</option>
        <option value="yaml">YAML</option>
        <option value="plaintext">Plain text</option>
      </select>
    }
  </div>
</div>
